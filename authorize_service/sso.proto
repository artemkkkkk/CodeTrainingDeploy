syntax = "proto3";
package sso;

message RegisterRequest {
  string name = 1;
  string email = 2;
  string password = 3;
}

message RegisterResponse {
  string status = 1;
}

message LoginRequest {
  string name = 1;
  string password = 2;
}

message LoginResponse {
  string status = 1;
  string token = 2;
}

message TokenValidateRequest {
  string token = 1;
}

message TokenValidateResponse {
  bool isValid = 1;
  bool isModer = 2;
  int64 userId = 3;
  string name = 4;
  string created_at = 5; // 2023-10-27T14:30:00.000Z год-месяц-деньTчасы:минуты:секунды.миллисекуныZ
}

service ssoService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc TokenValidate (TokenValidateRequest) returns (TokenValidateResponse);
}